baseURL = 'https://innumerablerandomformations.com/'
locale = 'en-us'
title = 'Innumerable Random Formations'
theme = 'irf-theme'

[params]
  logo = 'irf.'
  shortTitle = 'irf.'
  description = 'Innumerable Random Formations — essays by Umit Aslan'
  [params.author]
    name = 'Umit Aslan'
    email = 'umit@umitaslan.com'

[pagination]
  pagerSize = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ['html', 'rss']
  section = ['html']
  taxonomy = ['html']
  term = ['html']

[services]
  [services.rss]
    limit = 30